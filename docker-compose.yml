services:
  postgres:
    # Test-only database. Production uses docker-compose.prod.yml on the VPS.
    profiles: ["test"]
    image: postgres:17
    environment:
      POSTGRES_DB: kaihou_gm
      POSTGRES_USER: kaihou_gm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for tests}
    ports:
      - "54329:5432"
    volumes:
      - gm-dashboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaihou_gm -d kaihou_gm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gm-dashboard-postgres:
