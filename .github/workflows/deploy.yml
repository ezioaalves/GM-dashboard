name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: kaihou_gm
          POSTGRES_USER: kaihou_gm
          POSTGRES_PASSWORD: kaihou_gm_dev
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U kaihou_gm -d kaihou_gm"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://kaihou_gm:kaihou_gm_dev@127.0.0.1:5432/kaihou_gm
      KAIHOU_VAULT_ROOT: ${{ github.workspace }}/.test-vault
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pytest
      - run: PYTHONPATH=backend alembic -c alembic.ini upgrade head
      - run: python -m pytest backend/tests
  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ vars.VPS_DEPLOY_PATH }}
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build
