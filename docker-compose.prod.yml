services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: kaihou_gm
      POSTGRES_USER: kaihou_gm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - gm-dashboard-postgres:/var/lib/postgresql/data
      - ./backend/gm_dashboard/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaihou_gm -d kaihou_gm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://kaihou_gm:${POSTGRES_PASSWORD}@postgres:5432/kaihou_gm
      KAIHOU_VAULT_ROOT: ${KAIHOU_VAULT_ROOT}
    volumes:
      - ${KAIHOU_VAULT_ROOT}:${KAIHOU_VAULT_ROOT}:rw
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:8002:80"
    restart: unless-stopped

volumes:
  gm-dashboard-postgres:
