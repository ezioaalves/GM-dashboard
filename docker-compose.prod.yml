services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: kaihou_gm
      POSTGRES_USER: kaihou_gm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - gm-dashboard-postgres:/var/lib/postgresql/data
      - ./backend/gm_dashboard/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaihou_gm -d kaihou_gm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gm-dashboard-backend
    networks: [default, proxy-tier]
    environment:
      DATABASE_URL: postgresql://kaihou_gm:${POSTGRES_PASSWORD}@postgres:5432/kaihou_gm
      KAIHOU_VAULT_ROOT: ${KAIHOU_VAULT_ROOT}
    volumes:
      - ${KAIHOU_VAULT_ROOT}:${KAIHOU_VAULT_ROOT}:rw
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gm-dashboard-frontend
    networks: [default, proxy-tier]
    ports:
      - "127.0.0.1:8002:80"
    restart: unless-stopped

volumes:
  gm-dashboard-postgres:

networks:
  # Nginx Proxy Manager's shared network on the VPS — it terminates TLS and
  # Basic Auth for gm.ezioalves.cloud and proxies to these containers by name.
  proxy-tier:
    external: true
